<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraCloset — Dual-Screen Luxury Prototype</title>
  <style>
    :root {
      --primary: #101826;
      --secondary: #D0B892;
      --sage: #8AA39B;
      --blush: #EACFD3;
      --text-light: #FFFFFF;
      --glass-surface: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.16);
      --gold-border: rgba(208, 184, 146, 0.45);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-color: #121216;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .device-mockup {
      width: 393px;
      height: 852px;
      background: var(--primary);
      border-radius: 54px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 35px 90px rgba(0,0,0,0.7), 0 0 0 12px #26272d, 0 0 0 14px #18191d;
      display: flex;
      flex-direction: column;
    }
    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 35px;
      background: #000000;
      border-radius: 20px;
      z-index: 1000;
    }
    .status-bar {
      position: absolute;
      top: 17px;
      width: 100%;
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      z-index: 900;
      opacity: 0.9;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    .scrim-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;

      z-index: 2;
    }
    .device-mockup.auth-active .scrim-layer {
      background: linear-gradient(180deg, rgba(16,24,38,0.55) 0%, rgba(16,24,38,0.85) 35%, rgba(16,24,38,0.98) 70%, rgba(16,24,38,1) 100%);
    }

    /* Screens Viewport */
    .screens-container {
      position: relative;
      z-index: 10;
      flex: 1;
      width: 100%;
      height: 100%;
    }
    
    .screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 24px 48px 24px;
      transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Screen 1: Landing */
    #screen-welcome {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .device-mockup.auth-active #screen-welcome {
      opacity: 0;
      transform: translateX(-40px);
      pointer-events: none;
    }

    /* Screen 2: Auth */
    #screen-auth {
      opacity: 0;
      transform: translateX(50px);
      pointer-events: none;
      justify-content: flex-start;
      padding-top: 64px;
    }
    .device-mockup.auth-active #screen-auth {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    /* Shared UI Components */
    .brand-group { margin-bottom: 36px; }
    .micro-label {
      font-size: 11px; font-weight: 600; color: var(--secondary);
      letter-spacing: 4.5px; margin-bottom: 10px; text-transform: uppercase;
    }
    .headline {
      font-size: 34px; font-weight: 700; color: var(--text-light);
      line-height: 1.15; letter-spacing: -0.8px;
    }
    
    .btn-stack { display: flex; flex-direction: column; gap: 14px; }
    
    .glass-card {
      height: 56px; border-radius: 18px;
      background: var(--glass-surface);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
      cursor: pointer; transition: all 0.2s ease;
      position: relative; overflow: hidden;
    }
    .glass-card:active { transform: scale(0.97); opacity: 0.88; }
    
    .glass-card.gold-glow {
      background: rgba(208, 184, 146, 0.16);
      border-color: var(--gold-border);
      box-shadow: 0 12px 36px rgba(0,0,0,0.4), 0 0 24px rgba(208,184,146,0.15);
      color: #FFFFFF;
    }

    /* Screen 2 Auth Specifics */
    .auth-nav-bar {
      display: flex; align-items: center; margin-bottom: 24px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; transition: all 0.2s;
    }
    .back-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.15); }

    .auth-header-compact { margin-bottom: 24px; }
    .auth-headline { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .auth-sub { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }

    .social-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .social-pill {
      flex: 1; height: 48px; border-radius: 15px;
      background: var(--glass-surface); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .social-pill:active { transform: scale(0.97); }
    .social-pill.apple { border-color: rgba(208,184,146,0.4); background: rgba(208,184,146,0.1); }

    .divider {
      display: flex; align-items: center; text-align: center; color: rgba(255,255,255,0.35);
      font-size: 12px; font-weight: 500; margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .divider::before { margin-right: 12px; }
    .divider::after { margin-left: 12px; }

    .auth-tabs { display: flex; gap: 24px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
    .auth-tab {
      font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.45);
      cursor: pointer; position: relative; padding-bottom: 12px; margin-bottom: -13px;
      transition: color 0.2s;
    }
    .auth-tab.active { color: #fff; font-weight: 700; border-bottom: 2px solid var(--secondary); }

    .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
    .glass-input {
      height: 52px; border-radius: 16px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14); padding: 0 16px;
      color: #fff; font-size: 15px; font-family: inherit; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .glass-input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(208,184,146,0.2);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.35); }

    .forgot-link {
      align-self: center; font-size: 13px; font-weight: 500; color: var(--sage);
      margin-top: 16px; cursor: pointer;
    }

    /* Submit CTA */
    .submit-btn {
      height: 54px; border-radius: 18px; background: var(--secondary);
      color: var(--primary); font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-top: 10px; box-shadow: 0 8px 25px rgba(208,184,146,0.3);
      transition: transform 0.2s;
    }
    .submit-btn:active { transform: scale(0.97); }

    /* Toast Notification */
    .toast {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(30px);
      background: rgba(16,24,38,0.95); border: 1px solid var(--secondary);
      color: #fff; padding: 12px 20px; border-radius: 24px; font-size: 13px; font-weight: 500;
      z-index: 2000; opacity: 0; transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

            <svg width="16" height="18" viewBox="0 0 170 170" fill="currentColor"><path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.973-3.17-14.34-3.17-4.58 0-9.492 1.05-14.746 3.17-5.262 2.13-9.501 3.24-12.742 3.35-4.354.13-9.134-1.9-14.34-6.08-3.698-3.03-7.611-7.85-11.741-14.44-6.416-10.13-11.434-21.87-15.056-35.22-3.622-13.36-5.433-26.24-5.433-38.64 0-15.5 3.868-28.16 11.603-37.99 7.734-9.84 17.56-14.88 29.474-15.13 5.393 0 11.168 1.48 17.323 4.44 6.156 2.96 9.873 4.45 11.149 4.45 1.05 0 4.881-1.57 11.481-4.71 6.61-3.14 12.44-4.52 17.51-4.14 13.56.98 24.36 6.37 32.39 16.16-11.9 7.18-17.7 17.48-17.41 30.88.29 10.3 4.4 18.84 12.35 25.62 7.94 6.78 17.15 10.37 27.63 10.77-2.12 11.09-5.75 21.66-10.9 31.7zM119.22 31.89c0-7.14 2.58-13.91 7.75-20.31 5.17-6.4 11.83-10.23 20-11.5-.12 1.35-.19 2.51-.19 3.49 0 7.08-2.6 13.91-7.81 20.48-5.2 6.57-11.96 10.45-20.26 11.64-.17-.93-.24-2.14-.24-3.6z"/></svg>
            <span>Apple</span>
          </div>
        </div>

        <div class="divider">or</div>

        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</div>
          <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create account</div>
        </div>

        <div class="form-group">
          <label class="form-label">Email address *</label>
          <input type="email" class="glass-input" placeholder="stylist@auracloset.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password *</label>
          <input type="password" class="glass-input" placeholder="••••••••••••">
        </div>

        <div class="submit-btn" id="submit-btn-text" onclick="showToast('Authenticating with Supabase Postgres...')">
          Sign in
        </div>

        <div class="forgot-link" onclick="showToast('Triggering PKCE Password Reset Email...')">
          Forgot password?
        </div>
      </div>

    </div>

    <div class="toast" id="toast">Ready</div>
  </div>

  <script>
    function goToScreen(screen) {
      const mockup = document.getElementById('mockup');
      if (screen === 'auth') {
        mockup.classList.add('auth-active');
      } else {
        mockup.classList.remove('auth-active');
      }
    }

    function switchTab(tab) {
      const tabSignin = document.getElementById('tab-signin');
      const tabSignup = document.getElementById('tab-signup');
      const submitBtn = document.getElementById('submit-btn-text');

      if (tab === 'signin') {
        tabSignin.classList.add('active');
        tabSignup.classList.remove('active');
        submitBtn.textContent = 'Sign in';
      } else {
        tabSignin.classList.remove('active');
        tabSignup.classList.add('active');
        submitBtn.textContent = 'Create account';
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
