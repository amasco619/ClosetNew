<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraCloset — Luxury Onboarding Prototype</title>
  <style>
    :root {
      --primary: #101826;
      --secondary: #D0B892;
      --sage: #8AA39B;
      --blush: #EACFD3;
      --background: #F5F3F0;
      --surface: #FFFFFF;
      --border: rgba(16, 24, 38, 0.1);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-color: #121216;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .device-mockup {
      width: 393px;
      height: 852px;
      background: var(--background);
      border-radius: 54px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 35px 90px rgba(0,0,0,0.7), 0 0 0 12px #26272d, 0 0 0 14px #18191d;
      display: flex;
      flex-direction: column;
      padding: 64px 24px 36px 24px;
    }
    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 35px;
      background: #000000;
      border-radius: 20px;
      z-index: 1000;
    }
    .status-bar {
      position: absolute;
      top: 17px; left: 0; width: 100%;
      padding: 0 32px;
      display: flex; justify-content: space-between;
      color: var(--primary); font-size: 14px; font-weight: 600;
      z-index: 900;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    /* Top Nav & Progress */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: flex-start;
      color: var(--primary); cursor: pointer; transition: opacity 0.2s;
    }
    .back-btn:active { opacity: 0.5; }

    .progress-container {
      flex: 1; margin-left: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .progress-track {
      width: 100%; height: 4px; border-radius: 2px;
      background: rgba(16, 24, 38, 0.08); overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 10%; border-radius: 2px;
      background: var(--secondary);
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .micro-tracker {
      font-size: 10px; font-weight: 600; color: var(--sage);
      letter-spacing: 3px; text-transform: uppercase;
    }

    /* Content Area */
    .content-area {
      flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
      padding-top: 24px;
    }

    /* Atelier Monogram Badge */
    .monogram-badge {
      width: 50px; height: 50px; border-radius: 16px;
      background: rgba(208, 184, 146, 0.14);
      border: 1px solid rgba(208, 184, 146, 0.35);
      display: flex; align-items: center; justify-content: center;
      color: var(--secondary); font-size: 20px; font-weight: 700;
      margin-bottom: 28px;
      box-shadow: 0 4px 16px rgba(208, 184, 146, 0.12);
      animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .header-group { margin-bottom: 32px; animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.08s forwards; opacity: 0; }
    .headline { font-size: 30px; font-weight: 700; color: var(--primary); letter-spacing: -0.8px; line-height: 1.2; }
    .subtitle { font-size: 14px; color: rgba(16, 24, 38, 0.65); line-height: 1.5; margin-top: 8px; }

    /* Elevated Surface Input */
    .input-group {
      animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.16s forwards; opacity: 0;
    }
    .input-label { font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
    .luxury-input {
      width: 100%; height: 58px; border-radius: 18px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 0 20px; font-size: 18px; font-weight: 600; color: var(--primary);
      font-family: inherit; outline: none;
      box-shadow: 0 6px 20px rgba(16, 24, 38, 0.04);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .luxury-input:focus {
      border-color: var(--secondary);
      box-shadow: 0 10px 30px rgba(16, 24, 38, 0.08), 0 0 0 3px rgba(208, 184, 146, 0.2);
      transform: translateY(-2px);
    }
    .luxury-input::placeholder { color: rgba(16, 24, 38, 0.3); font-weight: 500; }

    /* Keyboard Simulation Area */
    .keyboard-spacer {
      flex: 1; transition: flex 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Submit CTA */
    .cta-wrapper {
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.24s forwards; opacity: 0;
    }
    .submit-btn {
      width: 100%; height: 56px; border-radius: 18px;
      background: rgba(16, 24, 38, 0.12);
      color: rgba(16, 24, 38, 0.35); font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: not-allowed; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid transparent;
    }
    
    .submit-btn.active {
      background: var(--primary);
      color: var(--secondary);
      cursor: pointer;
      box-shadow: 0 12px 36px rgba(16, 24, 38, 0.25);
    }
    .submit-btn.active:active {
      transform: scale(0.97); opacity: 0.9;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Toast Notification */
    .toast {
      position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(16,24,38,0.95); border: 1px solid var(--secondary);
      color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 12px; font-weight: 500;
      z-index: 2000; opacity: 0; transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="device-mockup" id="mockup">
    <div class="dynamic-island"></div>
    
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M1 9.5C1 9.22386 1.22386 9 1.5 9H3.5C3.77614 9 4 9.22386 4 9.5V11C4 11.2761 3.77614 11.5 3.5 11.5H1.5C1.22386 11.5 1 11.2761 1 11V9.5ZM6 6.5C6 6.22386 6.22386 6 6.5 6H8.5C8.77614 6 9 6.22386 9 6.5V11C9 11.2761 8.77614 11.5 8.5 11.5H6.5C6.22386 11.5 6 11.2761 6 11V6.5ZM11 3.5C11 3.22386 11.2239 3 11.5 3H13.5C13.7761 3 14 3.22386 14 3.5V11C14 11.2761 13.7761 11.5 13.5 11.5H11.5C11.2239 11.5 11 11.2761 11 11V3.5Z"/></svg>
        <svg width="18" height="10" viewBox="0 0 18 10" fill="currentColor"><rect x="0.5" y="0.5" width="15" height="9" rx="2.5" stroke="currentColor" fill="none"/><rect x="2" y="2" width="12" height="6" rx="1" fill="currentColor"/><path d="M16.5 3.5V6.5C17.3284 6.5 18 5.82843 18 5C18 4.17157 17.3284 3.5 16.5 3.5Z" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="top-nav">
      <div class="back-btn" onclick="showToast('Navigating back to Welcome screen')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
      </div>
      <div class="progress-container">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="micro-tracker">Step 1 of 10 · Personal Calibration</div>
      </div>
    </div>

    <div class="content-area">
      
      <!-- Minimalist Geometric Monogram replacing cartoon hanger -->
      <div class="monogram-badge">◆</div>

      <div class="header-group">
        <div class="headline">May we have your name?</div>
        <div class="subtitle">To begin your personal calibration, how should your quiet-luxury stylist address you?</div>
      </div>

      <div class="input-group">
        <input 
          type="text" 
          class="luxury-input" 
          id="name-input" 
          placeholder="Your name" 
          autocomplete="off"
          oninput="checkInput(this.value)"
        >
      </div>

    </div>

    <div class="keyboard-spacer"></div>

    <div class="cta-wrapper">
      <div class="submit-btn" id="continue-btn" onclick="triggerContinue()">
        <span>Continue</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
      </div>
    </div>

    <div class="toast" id="toast">Ready</div>
  </div>

  <script>
    function checkInput(val) {
      const btn = document.getElementById('continue-btn');
      const progress = document.getElementById('progress-fill');

      if (val.trim().length >= 2) {
        btn.classList.add('active');
        progress.style.width = '15%';
      } else {
        btn.classList.remove('active');
        progress.style.width = '10%';
      }
    }

    function triggerContinue() {
      const btn = document.getElementById('continue-btn');
      if (!btn.classList.contains('active')) {
        showToast('Please enter at least 2 characters');
        return;
      }
      showToast('Saving profile to AsyncStorage & advancing to Step 2...');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
